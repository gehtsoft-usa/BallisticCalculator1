name: .NET Core Build with Tests

on:
  push:
    branches:
    - main
    - dev
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: test
    runs-on: ubuntu-latest
    env:
      config: 'Release'
      gs_nuget: https://www.myget.org/F/gehtsoft-public/api

    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 8.0.414

      # restore dependencies
    - name: Install dependencies
      run: dotnet restore

      # build project
    - name: Build
      run: dotnet build --configuration $config --no-restore

      # set report file and title
    - name: Set Test Title
      run: |
            if ${{ github.event_name == 'pull_request' }}
            then
              echo "title=Test Run for PR #${{github.event.pull_request.number}} (${{github.run_number}})" >> $GITHUB_ENV
              echo "file_name=TestReport.${{github.event.pull_request.number}}.${{github.run_number}}.md" >> $GITHUB_ENV
            else
              echo "title=Test Run ${{github.run_number}}" >> $GITHUB_ENV
              echo "file_name=TestReport.${{github.run_number}}.md" >> $GITHUB_ENV
            fi

      # run tests with built project
    - name: Test PR
      run: dotnet test --no-restore --no-build --configuration $config --logger:"liquid.md;LogFileName=${{github.workspace}}/${{env.file_name}};Title=${{env.title}};"

      # upload report as build artifact
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6
      if: ${{always()}}
      with:
        name: test-run-${{env.file_name}}
        path: ${{github.workspace}}/${{env.file_name}}
        overwrite: true
        include-hidden-files: true
